<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    margin-bottom:20px;
    text-align:center;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input, textarea, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

input, textarea{
    background:#334155;
    color:white;
}

button{
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.trade{
    background:#334155;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.delete-btn{
    background:#ef4444;
    margin-top:10px;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.stat-box{
    background:#334155;
    padding:15px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>📈 Offline Trading Journal</h1>

<div class="card">
    <h2>Add Trade</h2>

    <input type="text" id="pair" placeholder="Pair (XAUUSD)">
    
    <input type="number" id="profit" placeholder="Profit / Loss">

    <textarea id="note" placeholder="Trade Notes"></textarea>

    <input type="file" id="imageInput" accept="image/*">

    <button onclick="saveTrade()">Save Trade</button>
</div>

<div class="card">
    <h2>Statistics</h2>

    <div class="stats">
        <div class="stat-box">
            <h3 id="totalTrades">0</h3>
            <p>Total Trades</p>
        </div>

        <div class="stat-box">
            <h3 id="totalPnL">$0</h3>
            <p>Total PnL</p>
        </div>
    </div>
</div>

<div class="card">
    <h2>Trade History</h2>
    <div id="tradeList"></div>
</div>

</div>

<script>
let db;

const request = indexedDB.open("TradingJournalDB", 1);

request.onupgradeneeded = function(event){
    db = event.target.result;

    db.createObjectStore("trades", {
        keyPath:"id",
        autoIncrement:true
    });
};

request.onsuccess = function(event){
    db = event.target.result;
    loadTrades();
};

function saveTrade(){

    const pair = document.getElementById("pair").value;
    const profit = document.getElementById("profit").value;
    const note = document.getElementById("note").value;
    const imageFile = document.getElementById("imageInput").files[0];

    if(!pair || !profit){
        alert("Please fill all fields");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(){

        const trade = {
            pair,
            profit: Number(profit),
            note,
            image: reader.result,
            date: new Date().toLocaleString()
        };

        const transaction = db.transaction(["trades"], "readwrite");
        const store = transaction.objectStore("trades");

        store.add(trade);

        transaction.oncomplete = function(){
            loadTrades();

            document.getElementById("pair").value = "";
            document.getElementById("profit").value = "";
            document.getElementById("note").value = "";
            document.getElementById("imageInput").value = "";
        };
    };

    if(imageFile){
        reader.readAsDataURL(imageFile);
    }else{
        reader.onload();
    }
}

function loadTrades(){

    const tradeList = document.getElementById("tradeList");
    tradeList.innerHTML = "";

    let totalPnL = 0;
    let totalTrades = 0;

    const transaction = db.transaction(["trades"], "readonly");
    const store = transaction.objectStore("trades");

    const request = store.openCursor();

    request.onsuccess = function(event){

        const cursor = event.target.result;

        if(cursor){

            const trade = cursor.value;

            totalPnL += trade.profit;
            totalTrades++;

            tradeList.innerHTML += `
                <div class="trade">
                    <h3>${trade.pair}</h3>
                    <p><strong>PnL:</strong> $${trade.profit}</p>
                    <p>${trade.note}</p>
                    <small>${trade.date}</small>

                    ${
                        trade.image
                        ? `<img src="${trade.image}">`
                        : ""
                    }

                    <button class="delete-btn"
                    onclick="deleteTrade(${trade.id})">
                    Delete
                    </button>
                </div>
            `;

            cursor.continue();
        }

        document.getElementById("totalTrades").innerText = totalTrades;
        document.getElementById("totalPnL").innerText = "$" + totalPnL;
    };
}

function deleteTrade(id){

    const transaction = db.transaction(["trades"], "readwrite");
    const store = transaction.objectStore("trades");

    store.delete(id);

    transaction.oncomplete = function(){
        loadTrades();
    };
}
</script>

</body>
